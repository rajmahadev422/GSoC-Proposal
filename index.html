<!DOCTYPE html>
<html data-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Docs Engine</title>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <link href="https://cdn.jsdelivr.net/npm/prismjs/themes/prism-tomorrow.css" rel="stylesheet">

  <!-- Prism core -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs/prism.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&display=swap"
    rel="stylesheet">

  <!-- Base location -->
  <base href="./">
  <link rel="stylesheet" href="styles/style.css">
  <link rel="stylesheet" href="styles/sidebar.css">
</head>

<body>
  <!-- HEADER -->
  <header id="header">
    <div class="header-left">
      <button id="menuBtn" aria-label="Toggle sidebar">☰</button>
      <div class="header-logo">D</div>
      <div class="header-brand">Docs <span>Engine</span></div>
    </div>
    <div class="header-center">
      <nav class="header-breadcrumb" id="breadcrumb">
        <span>Home</span>
      </nav>
    </div>
    <div class="header-right">
      <button id="themeToggle" aria-label="Toggle theme" title="Toggle light/dark mode">🌙</button>
    </div>
  </header>
  <div id="overlay"></div>
  <!-- MAIN LAYOUT -->
  <div id="layout">
    <div id="sidebar"></div>
    <div id="app"></div>
  </div>

  <footer class="footer">
    <div class="footer-content">
      <p>© 2026 Docs Engine. All rights reserved.</p>
      <div class="footer-links">
        <a href="https://github.com/rajmahadev422" target="_blank">GitHub</a>
      </div>
    </div>
  </footer>

  <!-- LANGUAGES -->
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-clike.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-c.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-cpp.min.js"></script>

  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-javascript.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-python.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-java.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/prismjs/components/prism-bash.min.js"></script>
  <!-- Local modules -->
  <script src="js/utils.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/tokenizer.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/createTabs.js"></script>
  <script src="js/main.js"></script>
</body>

</html>
